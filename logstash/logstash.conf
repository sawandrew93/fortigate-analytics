input {
  udp {
    port => 5140
  }
}

filter {
  # FortiGate logs are formatted as key=value pairs. This filter parses them instantly.
  kv {
    source => "message"
    value_split => "="
    field_split => " "
  }
  
  # By default, everything comes in as text. We must convert bytes to integers 
  # so Kibana can actually add up the bandwidth in your charts.
  mutate {
    convert => {
      "sentbyte" => "integer"
      "rcvdbyte" => "integer"
    }
    # Clean up the raw message to save disk space once parsed
    remove_field => ["message"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "fortigate-traffic-%{+YYYY.MM.dd}"
  }
  # Prints to console so you can verify logs are arriving during setup
  stdout { codec => rubydebug } 
}
