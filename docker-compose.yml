services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - elastic-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4g

  # ==========================================
  # AUTOMATION SETUP CONTAINER (Runs once, then exits)
  # ==========================================
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: setup
    user: "0"
    command: >
      bash -c '
        echo "Waiting for Elasticsearch cluster to be healthy..."
        until curl -s -u elastic:${ELASTIC_PASSWORD} http://elasticsearch:9200/_cluster/health | grep -q -E "green|yellow"; do
          sleep 2
        done
        
        echo "Elasticsearch is healthy! Setting kibana_system password automatically..."
        curl -s -u elastic:${ELASTIC_PASSWORD} -X POST http://elasticsearch:9200/_security/user/kibana_system/_password \
          -H "Content-Type: application/json" \
          -d "{\"password\":\"${KIBANA_PASSWORD}\"}"
          
        echo "Kibana password auto-configuration complete!"
      '
    networks:
      - elastic-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
    ports:
      - "5601:5601"
    # Kibana will wait specifically for the setup container to finish its job
    depends_on:
      elasticsearch:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    networks:
      - elastic-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: filebeat
    user: root
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command: >
      filebeat -e 
      -E modules.list=fortinet 
      -E output.elasticsearch.username=elastic 
      -E output.elasticsearch.password=${ELASTIC_PASSWORD}
      -E setup.kibana.host=kibana:5601
      -E setup.kibana.username=elastic
      -E setup.kibana.password=${ELASTIC_PASSWORD}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - fb_data:/usr/share/filebeat/data
    ports:
      - "5140:5140/udp"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    networks:
      - elastic-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 500m

volumes:
  es_data:
  fb_data:

networks:
  elastic-net:
    driver: bridge
